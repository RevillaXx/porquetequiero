<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi novia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css">
    
    <style>
        body { 
            margin: 0; height: 100vh; 
            display: flex; flex-direction: column; 
            align-items: center; 
            background: url('FOTO.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; /* Evita el scroll */
        }

        /* 3- Subir título con margen superior */
        .titulo-grande {
            margin-top: 30px;
            font-size: 3rem; 
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold; 
            color: #09a4ec; 
            text-shadow: -1px 0 #414D68, 0 1px #414D68, 1px 0 #414D68, 0 -1px #414D68, 
                         -2px 2px 0 #414D68, 2px 2px 0 #414D68, 1px 1px #414D68, 2px 2px #414D68, 
                         3px 3px #414D68, 4px 4px #414D68, 5px 5px #414D68, 6px 6px #414D68;
        }

        /* 1- Centrar contador */
        .your-clock { 
            display: flex; justify-content: center; 
            margin-top: auto; 
            margin-bottom: auto;
            transform: scale(0.85); /* Escala para que no se corte */
        }

        /* 2- Separación de 20px entre bloques (CSS de FlipClock) */
        .flip-clock-wrapper ul { margin: 0 10px !important; }

        .estilo-etiquetas {
            text-align: center; 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold; 
            font-size: 16px; 
            color: #EBD758; 
            text-shadow: 1px 1px 2px #414D68;
            display: flex;
            justify-content: center;
            gap: 45px;
            margin-bottom: 20px;
        }

        /* 4- Margen inferior de 100px para botones */
        .contenedor-botones {
            display: flex;
            gap: 40px;
            margin-bottom: 100px;
        }

        .btn-img {
            width: 100px; 
            cursor: pointer; 
            transition: transform 0.3s;
        }
    </style>
</head>
<body>

    <h1 class="titulo-grande">Nuestro Día Especial</h1>

    <div class="your-clock"></div>

    <div class="clock-labels estilo-etiquetas">
        <div>DÍAS</div>
        <div>HRS</div>
        <div>MINS</div>
        <div>SEGS</div>
    </div>

    <div class="contenedor-botones">
        <a href="tarjetas.html">
            <img src="corazon.png" class="btn-img" alt="Regalo">
        </a>
        <a href="chistes.html">
            <img src="risa.png" class="btn-img" alt="Chistes">
        </a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

    <script>
        $(document).ready(function() {
            var fechaDestino = new Date("2026-07-06T00:00:00").getTime();
            var ahora = new Date().getTime();
            var diferencia = (fechaDestino - ahora) / 1000;

            $('.your-clock').FlipClock(diferencia, {
                clockFace: 'DailyCounter',
                countdown: true
            });

            $('.flip-clock-label').hide();
        });
    </script>
</body>
</html>
