<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TE QUIERO</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            /* Imagen de fondo local */
            background: url('fondo tequiero.png') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        /* Carrusel responsivo */
        .swiper { width: 100%; max-width: 400px; height: 350px; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }

        /* Tarjetas */
        .card {
            width: 180px; height: 280px;
            perspective: 1000px; cursor: pointer;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }

        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            /* Borde grueso aplicado aquí */
            border: 8px solid transparent; 
        }
        .front { background: white; }
        .back { color: white; transform: rotateY(180deg); }
        .emoji { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="carrusel">
            <!-- Las tarjetas se generan por JS -->
        </div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
      const chistes = [
            {q: "¿Sabes por qué te quiero? ❤️", a: "Porque me haces sentir importante sin que te lo pida."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque me haces sentir una ilusión que no creía que existiera."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque cuando tengo un mal día, solo escucharte y verte sonreir es suficiente para cambiarlo."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque me valoras por quien soy."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque la mujer que conocí tiene un corazón todavía más lindo de lo que pensaba."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque me has enseñado que el amor se siente de verdad."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque me haces querer darte mi mejor versión cada día."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque aunque tengas tus momentos difíciles sigues preocupándote por los demás."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque has conseguido que vuelva a sonreír cuando antes solo miraba hacia alante."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque contigo no siento que tenga que impresionarte, solo ser yo."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque cuando me abres tu corazón, es porque confias en mi."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque eres la persona que hace que los dias sean mejor y encima sin darte cuenta."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque me haces sentir a tu lado incluso estando lejos."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque cuando hablamos de futuro, por primera vez me ilusiona y quiero que sea contigo."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque me has demostrado que estas dispuesta a amarme de verdad."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque has conseguido que mis planes ya no sean solo míos, y sean nuestros planes."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque cuando todo se pone difícil, sigues siendo una mujer fuerte sin dejar de quererme."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque me has hecho sentir querido de una forma que nunca había pasado."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque cuanto más te conozco, más me impresiona la mujer que eres."},
{q: "¿Sabes por qué te quiero? ❤️", a: "Porque llegaste sin que te buscara, pero ahora no imagino mi vida sin ti."}
            
        ];

// Cambiamos a pares de colores para crear el degradado
        const degradados = [
            'linear-gradient(135deg, #FF9A9E 0%, #FECFE2 100%)',
            'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
            'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%)',
            'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)',
            'linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%)',
            'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)'
        ];

        const carrusel = document.getElementById('carrusel');
        chistes.forEach((c, index) => {
            const gradiente = degradados[index % degradados.length];
            
            carrusel.innerHTML += `
                <div class="swiper-slide">
                    <div class="card" onclick="this.classList.toggle('flipped')">
                        <div class="card-inner">
                            <div class="front">
                                <div class="emoji">🤔</div><h3>${c.q}</h3>
                            </div>
                            <div class="back" style="background: ${gradiente}">
                                <h3>${c.a}</h3>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        new Swiper('.swiper', { effect: 'cards', grabCursor: true });
    </script>
</body>
</html>
