<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css">
    
    <style>
        body { 
            margin: 0; height: 100vh; 
            display: flex; flex-direction: column; 
            align-items: center; 
            justify-content: space-between; /* Reparte elementos */
            background: url('FOTO.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; /* Evita scroll */
        }

        .titulo-grande {
            font-size: 3.5rem; 
            margin-top: 30px; /* Margen superior 30px */
            margin-bottom: 0;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold; 
            color: #09a4ec; 
            text-shadow: -1px 0 #414D68, 0 1px #414D68, 1px 0 #414D68, 0 -1px #414D68, 
                         -2px 2px 0 #414D68, 2px 2px 0 #414D68, 3px 3px #414D68;
        }

        .estilo-etiquetas {
            display: flex;
            justify-content: center;
            width: 100%;
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold; 
            font-size: 16px; 
            color: #EBD758; 
            text-shadow: 1px 1px 2px #414D68;
            margin-top: -10px;
        }

        .your-clock { 
            display: flex; justify-content: center; 
            transform: scale(0.7); /* Centrado y ajuste */
        }

        /* Espaciado para el reloj */
        .flip-clock-wrapper ul { margin: 0 10px !important; }

        .contenedor-botones {
            display: flex;
            gap: 40px;
            margin-bottom: 50px; /* Margen inferior 50px */
        }

        .btn-img {
            width: 100px; cursor: pointer; transition: transform 0.3s;
        }
        .btn-img:hover { transform: scale(1.1); }

        /* Ajuste fino para móviles */
        @media (max-width: 600px) {
            .titulo-grande { font-size: 2.2rem !important; }
            .your-clock { transform: scale(0.55); margin: -20px 0; }
        }
    </style>
</head>
<body>

    <h1 class="titulo-grande">Nuestro Día Especial</h1>

    <div class="your-clock"></div>

    <div class="estilo-etiquetas">
        <div style="margin-right: 45px;">DÍAS</div>
        <div style="margin-right: 45px;">HRS</div>
        <div style="margin-right: 45px;">MINS</div>
        <div>SEGS</div>
    </div>

    <div class="contenedor-botones">
        <a href="tarjetas.html">
            <img src="corazon.png" class="btn-img" alt="Regalo">
        </a>
        <a href="chistes.html">
            <img src="risa.png" class="btn-img" alt="Chistes">
        </a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

    <script>
        $(document).ready(function() {
            var fechaDestino = new Date("2026-07-06T00:00:00").getTime();
            var ahora = new Date().getTime();
            var diferencia = (fechaDestino - ahora) / 1000;

            $('.your-clock').FlipClock(diferencia, {
                clockFace: 'DailyCounter',
                countdown: true
            });

            $('.flip-clock-label').hide();
        });
    </script>
</body>
</html>
