<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bea💙💗Victor</title>
    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; /* Centra todo verticalmente */
            background: url('FOTO.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            gap: 25px; /* Espacio uniforme entre TODOS los elementos */
            padding: 20px;
        }

        .titulo-grande {
            font-size: 3.5rem; 
            color: #09a4ec; 
            margin: 0;
            text-align: center;
            text-shadow: 2px 2px 4px #414D68;
        }

        .contenedor-contador {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .label-contador {
            font-size: 1.3rem;
            color: #414D68;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .valor-contador {
            font-size: 1.6rem;
            color: #ff4d6d;
            font-weight: bold;
        }

        .contenedor-botones {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        .btn-img {
            width: 90px; 
            cursor: pointer; 
            transition: transform 0.3s;
        }
        .btn-img:hover { transform: scale(1.1); }

        @media (max-width: 600px) {
            .titulo-grande { font-size: 2.2rem; }
            .contenedor-contador { padding: 15px; }
            .valor-contador { font-size: 1.3rem; }
            .btn-img { width: 70px; }
            body { gap: 15px; } /* Menos espacio en móviles para que quepa todo */
        }
    </style>
</head>
<body>

    <h1 class="titulo-grande">Bea💙💗Victor</h1>

    <div class="contenedor-contador">
        <div class="label-contador">💖 Tiempo juntos</div>
        <div id="counter-juntos" class="valor-contador">Cargando...</div>
    </div>

    <div class="contenedor-contador">
        <div class="label-contador">⏳ Para nuestro día especial</div>
        <div id="counter-especial" class="valor-contador">Cargando...</div>
    </div>

    <div class="contenedor-botones">
        <a href="tarjetas.html"><img src="corazon.png" class="btn-img"></a>
        <a href="chistes.html"><img src="risa.png" class="btn-img"></a>
        <a href="buenos dias.html"><img src="buenos dias.png" class="btn-img"></a>
    </div>

    <script>
        const startDate = new Date("2026-04-05T00:00:00");
        const specialDate = new Date("2026-07-14T00:00:00");

        function actualizar() {
            const now = new Date();
            
            // Lógica tiempo juntos
            const diffJ = now - startDate;
            document.getElementById("counter-juntos").innerHTML = 
                `${Math.floor(diffJ / (1000*60*60*24))} días ${Math.floor(diffJ/(1000*60*60)%24)}h ${Math.floor(diffJ/(1000*60)%60)}m ${Math.floor(diffJ/1000%60)}s`;

            // Lógica día especial
            const diffE = specialDate - now;
            document.getElementById("counter-especial").innerHTML = 
                `${Math.floor(diffE / (1000*60*60*24))} días ${Math.floor(diffE/(1000*60*60)%24)}h ${Math.floor(diffE/(1000*60)%60)}m ${Math.floor(diffE/1000%60)}s`;
        }
        setInterval(actualizar, 1000);
        actualizar();
    </script>
</body>
</html>
