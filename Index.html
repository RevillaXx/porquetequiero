<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css">
    
    <style>
        body { 
            margin: 0; min-height: 100vh; 
            display: flex; flex-direction: column; 
            align-items: center;
            background: url('FOTO.png') no-repeat center center fixed;
            background-size: cover;
            background-attachment: fixed;
        }

        .titulo-grande {
            font-size: 5rem; 
            margin-top: 30px;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold; 
            color: #09a4ec; 
            text-shadow: -1px 0 #414D68, 0 1px #414D68, 1px 0 #414D68, 0 -1px #414D68, 
                         -2px 2px 0 #414D68, 2px 2px 0 #414D68, 1px 1px #414D68, 2px 2px #414D68, 
                         3px 3px #414D68, 4px 4px #414D68, 5px 5px #414D68, 6px 6px #414D68, 
                         7px 7px #414D68, 8px 8px #414D68, 9px 9px #414D68;
        }

        /* Contenedor del reloj con ancho fijo para que no se junte */
        .clock-wrapper {
            display: flex;
            justify-content: center;
            margin: 40px 0;
            width: 100%;
        }

        .your-clock { 
            width: auto !important; 
        }

        .contenedor-botones {
            display: flex;
            gap: 20px;
            margin-bottom: 100px; /* Margen inferior de 100px como pediste */
            margin-top: auto;
        }

        .btn-img {
            width: 120px; 
            cursor: pointer; 
            transition: transform 0.3s;
        }
        .btn-img:hover { transform: scale(1.1); }

        /* Adaptación para móviles */
        @media (max-width: 600px) {
            .titulo-grande { font-size: 2.5rem !important; margin-top: 30px; }
            .clock-wrapper { transform: scale(0.6); margin: -20px 0; }
            .btn-img { width: 80px !important; }
        }
    </style>
</head>
<body>

    <h1 class="titulo-grande">Nuestro Día Especial</h1>

    <!-- Contenedor independiente para que el reloj mantenga su espacio -->
    <div class="clock-wrapper">
        <div class="your-clock"></div>
    </div>

    <div class="contenedor-botones">
        <a href="tarjetas.html">
            <img src="corazon.png" class="btn-img" alt="Regalo">
        </a>
        <a href="chistes.html">
            <img src="risa.png" class="btn-img" alt="Chistes">
        </a>
        <a href="buenos dias.html">
            <img src="buenos dias.png" class="btn-img" alt="Buenos Días">
        </a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

    <script>
        $(document).ready(function() {
            var fechaDestino = new Date("2026-07-06T00:00:00").getTime();
            var ahora = new Date().getTime();
            var diferencia = (fechaDestino - ahora) / 1000;

            $('.your-clock').FlipClock(diferencia, {
                clockFace: 'DailyCounter',
                countdown: true
            });

            $('.flip-clock-label').hide();
        });
    </script>
</body>
</html>
