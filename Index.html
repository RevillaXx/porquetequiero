<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GPSDB9WLGJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-GPSDB9WLGJ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bea💙💗Victor</title>
    <style>
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            font-family: 'Comic Sans MS', cursive, sans-serif;
            gap: 20px; 
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .video-background {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            z-index: -100;
            object-fit: contain; 
            transform: translate(-50%, -50%);
            background-color: #0d8ca1; 
        }

        .titulo-grande {
            font-size: 3.5rem; 
            color: #09a4ec; 
            margin-top: 10px; 
            margin-bottom: 0px;
            text-align: center;
            text-shadow: 2px 2px 4px #414D68;
            z-index: 1;
        }

        .contenedor-contador {
            background: rgba(8, 189, 235, 0.75);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .label-contador {
            font-size: 1.3rem;
            color: #414D68;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .valor-contador {
            font-size: 1.6rem;
            color: #ff4d6d;
            font-weight: bold;
        }

        .contenedor-botones {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            z-index: 1;
            margin-top: auto; 
            margin-bottom: 20px;
        }

        .btn-img {
            width: 90px; 
            cursor: pointer; 
            transition: transform 0.3s;
        }
        .btn-img:hover { transform: scale(1.1); }

        /* NUEVO: Estilos para el botón de sonido flotante */
        .btn-sonido {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .btn-sonido:active { transform: scale(0.9); }

        @media (max-width: 600px) {
            .titulo-grande { 
                font-size: 2.2rem; 
                margin-top: 10px;
            }
            .contenedor-contador { padding: 15px; }
            .valor-contador { font-size: 1.3rem; }
            .btn-img { width: 70px; }
            body { gap: 15px; } 
            .btn-sonido { top: 15px; right: 15px; width: 40px; height: 40px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- Mantenemos el video silenciado por defecto para cumplir con el navegador -->
    <video autoplay loop muted playsinline id="miVideo" class="video-background">
        <source src="videos/BeaVic.mp4" type="video/mp4">
    </video>

    <!-- NUEVO: Botón flotante para activar el sonido -->
    <button id="botonSonido" class="btn-sonido">🔇</button>

    <h1 class="titulo-grande">Bea💙💗Victor</h1>

    <div class="contenedor-contador">
        <div class="label-contador">💖 Tiempo juntos</div>
        <div id="counter-juntos" class="valor-contador">Cargando...</div>
    </div>

    <div class="contenedor-botones">
        <a href="tarjetas.html"><img src="corazon.png" class="btn-img"></a>
        <a href="fotos.html"><img src="camara.png" class="btn-img"></a>
        <a href="chistes.html"><img src="risa.png" class="btn-img"></a>
        <a href="buenos dias.html"><img src="buenos dias.png" class="btn-img"></a>
    </div>

    <script>
        const startDate = new Date("2026-04-05T00:00:00");

        function actualizar() {
            const now = new Date();
            const diffJ = now - startDate;
            document.getElementById("counter-juntos").innerHTML = 
                `${Math.floor(diffJ / (1000*60*60*24))} días ${Math.floor(diffJ/(1000*60*60)%24)}h ${Math.floor(diffJ/(1000*60)%60)}m ${Math.floor(diffJ/1000%60)}s`;
        }
        setInterval(actualizar, 1000);
        actualizar();

        // NUEVO: Lógica del botón de sonido
        const video = document.getElementById("miVideo");
        const btnSonido = document.getElementById("botonSonido");

        btnSonido.addEventListener("click", () => {
            if (video.muted) {
                video.muted = false;
                btnSonido.innerHTML = "🔊"; // Cambia el emoji a encendido
            } else {
                video.muted = true;
                btnSonido.innerHTML = "🔇"; // Cambia el emoji a silenciado
            }
        });
    </script>
</body>
</html>
