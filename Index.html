<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css">
    
    <style>
        body { 
            margin: 0; height: 100vh; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            background: url('FOTO.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; /* Evita scroll */
        }

        .titulo-grande {
            position: absolute;
            top: 30px;
            font-size: 4rem; 
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold; 
            color: #09a4ec; 
            text-shadow: -1px 0 #414D68, 0 1px #414D68, 1px 0 #414D68, 0 -1px #414D68, 
                         -2px 2px 0 #414D68, 2px 2px 0 #414D68, 1px 1px #414D68, 2px 2px #414D68, 
                         3px 3px #414D68, 4px 4px #414D68, 5px 5px #414D68, 6px 6px #414D68;
        }

        .estilo-etiquetas {
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 45px;
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            font-weight: bold; 
            font-size: 16px; 
            color: #EBD758; 
            text-shadow: 1px 1px 2px #414D68;
            margin-top: 100px;
        }

        .your-clock { 
            display: flex; justify-content: center; 
        }

        /* Separación de 20px entre grupos de dígitos */
        .flip-clock-wrapper ul { margin: 0 10px !important; }

        .contenedor-botones {
            position: absolute;
            bottom: 100px;
            display: flex;
            gap: 40px;
        }

        .btn-img {
            width: 90px; cursor: pointer; transition: transform 0.3s;
        }
        .btn-img:hover { transform: scale(1.1); }

        /* Ajustes para móviles */
        @media (max-width: 600px) {
            .titulo-grande { font-size: 2rem !important; }
            .your-clock { transform: scale(0.7); }
            .estilo-etiquetas { gap: 25px; margin-top: 80px; }
            .btn-img { width: 70px !important; }
        }
    </style>
</head>
<body>

    <h1 class="titulo-grande">Nuestro Día Especial</h1>

    <div class="your-clock"></div>

    <div class="estilo-etiquetas">
        <div>DÍAS</div>
        <div>HRS</div>
        <div>MINS</div>
        <div>SEGS</div>
    </div>

    <div class="contenedor-botones">
        <a href="tarjetas.html">
            <img src="corazon.png" class="btn-img" alt="Regalo">
        </a>
        <a href="chistes.html">
            <img src="risa.png" class="btn-img" alt="Chistes">
        </a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

    <script>
        $(document).ready(function() {
            var fechaDestino = new Date("2026-07-06T00:00:00").getTime();
            var ahora = new Date().getTime();
            var diferencia = (fechaDestino - ahora) / 1000;

            $('.your-clock').FlipClock(diferencia, {
                clockFace: 'DailyCounter',
                countdown: true
            });

            $('.flip-clock-label').hide();
        });
    </script>
</body>
</html>
