<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChisteCard</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            /* Imagen de fondo local */
            background: url('fondo chiste.png') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        /* Carrusel responsivo */
        .swiper { width: 100%; max-width: 200px; height: 250px; }
        
        /* Ajuste específico para móviles en vertical */
        @media (max-height: 600px) {
            .swiper { height: 350px; }
            .card { width: 220px !important; height: 300px !important; }
        }

        .swiper-slide { display: flex; justify-content: center; align-items: center; }

        /* Tarjetas */
        .card {
            width: 140px; height: 240px;
            perspective: 1000px; cursor: pointer;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }

        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            /* Borde grueso aplicado aquí */
            border: 8px solid transparent; 
        }
        .front { background: white; }
        .back { color: white; transform: rotateY(180deg); }
        .emoji { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="carrusel">
            </div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
      const chistes = [
            {q: "¿Qué le dice un jaguar a otro jaguar?", a: "Jaguar you?"},
            {q: "¿Cómo se dice pañuelo en japonés?", a: "Saka-moko."},
            {q: "¿Qué le dice una pared a otra pared?", a: "Nos vemos en la esquina."},
            {q: "¿Cuál es el colmo de un jardinero?", a: "Que siempre lo dejen plantado."},
            {q: "¿Cómo se despiden los químicos?", a: "Ácido un placer."},
            {q: "¿Por qué los pájaros no usan Facebook?", a: "Porque ya tienen Twitter."},
            {q: "¿Qué le dice un techo a otro techo?", a: "Te-cho de menos."},
            {q: "¿Por qué los paraguas no se casan?", a: "Porque son muy cerrados."},
            {q: "¿Cómo se queda un mago después de comer?", a: "Magordito."},
            {q: "¿Qué le dice un pez a otro pez?", a: "¡Nada!"},
            {q: "¿Por qué el libro de matemáticas está triste?", a: "Porque tiene muchos problemas."},
            {q: "¿Qué le dice una iguana a su hermana gemela?", a: "Iguanita."},
            {q: "¿Qué hace un perro con un taladro?", a: "Taladrando."},
            {q: "¿Qué le dice un jardinero a otro?", a: "Seamos felices mientras podamos."},
            {q: "¿Qué le dice un semáforo a otro?", a: "No me mires que me estoy cambiando."},
            {q: "¿Por qué el ordenador fue al médico?", a: "Porque tenía un virus."},
            {q: "¿Qué hace un tomate en una esquina?", a: "Esperando el autobús."},
            {q: "¿Qué le dice una impresora a otra?", a: "¿Esa hoja es tuya o es impresión mía?"}
        ];

      // Cambiamos a pares de colores para crear el degradado
        const degradados = [
            'linear-gradient(135deg, #FF9A9E 0%, #FECFE2 100%)',
            'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
            'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%)',
            'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)',
            'linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%)',
            'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)'
        ];

        const carrusel = document.getElementById('carrusel');
        chistes.forEach((c, index) => {
            const gradiente = degradados[index % degradados.length];
            
            carrusel.innerHTML += `
                <div class="swiper-slide">
                    <div class="card" onclick="this.classList.toggle('flipped')">
                        <div class="card-inner">
                            <div class="front">
                                <div class="emoji">🤔</div><h3>${c.q}</h3>
                            </div>
                            <div class="back" style="background: ${gradiente}">
                                <h3>${c.a}</h3>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        new Swiper('.swiper', { effect: 'cards', grabCursor: true });
    </script>
</body>
</html>
