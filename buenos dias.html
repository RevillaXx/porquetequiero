<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buenos Dias</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            /* Imagen de fondo local */
            background: url('fondo buenos dias.png') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        /* Carrusel responsivo */
        .swiper { width: 100%; max-width: 400px; height: 350px; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }

        /* Tarjetas */
        .card {
            width: 280px; height: 380px;
            perspective: 1000px; cursor: pointer;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }

        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            /* Borde grueso aplicado aquí */
            border: 8px solid transparent; 
        }
        .front { background: rgb(6, 185, 230); }
        .back { color: white; transform: rotateY(180deg); }
        .emoji { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="carrusel">
            <!-- Las tarjetas se generan por JS -->
        </div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
      const chistes = [
           {q: "Buenos días, mi amor ❤️", a: "sabes que mi dia a dia es espertar y saber que eres lo primero en mi mente y es el regalo que no vi venir y que la vida me ha dado."},
{q: "Buenos días, mi niña✨", a: "No importa qué desafíos hay en cualquier día, me siento capaz de superarlos juntos porque estas a mi lado."},
{q: "Buenos días, mi vida 🌹", a: "A veces me pregunto qué hice para merecer a alguien tan increíble como tú. Hoy, al abrir los ojos, solo le pedí al universo que cuide de tu sonrisa y de tu corazón durante todo el día."},
{q: "Buenos días, mi futura todo 💫", a: "Espero que hoy sientas, en cada segundo, lo que te quiero porque eres mi mayor regalo del 2026."},
{q: "Buenos días, mi compañera de vida 🌍", a: "Mi dia a dia es mejor desde que se cruzaron nuestros caminos y espero que para ti sea tambien igual."},
{q: "Buenos días, mi gran amor ☀️", a: "Cada mañana es una nueva oportunidad para quererte un poco más que ayer pero menos que mañana."},
{q: "Buenos días, mi niña hermosa 💖", a: "Si pudiera darte una sola cosa en la vida, te daría la capacidad de verte a través de mis ojos y así entenderías lo especial que eres para mí."},
{q: "Buenos días, mi amorcito 🌟", a: "La vida es un camino de sorpresas y encontrarme contigo ha sido la mayor de mi vida."},
{q: "Buenos días, mi vida ☁️", a: " Que hoy tengas tanta felicidad como la que tú me das a mí con solo existir. Te quiero con todo mi corazon."},
{q: "Buenos días, mi alegría ❤️", a: "Hoy me he despertado con una felicidad muy loca por haberme cruzado en tu camino, quiero que tu dia sea tan dulce y real como lo que siento por ti."}          
        ];

// Cambiamos a pares de colores para crear el degradado
        const degradados = [
            'linear-gradient(135deg, #FF9A9E 0%, #FECFE2 100%)',
            'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
            'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%)',
            'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)',
            'linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%)',
            'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)'
        ];

        const carrusel = document.getElementById('carrusel');
        chistes.forEach((c, index) => {
            const gradiente = degradados[index % degradados.length];
            
            carrusel.innerHTML += `
                <div class="swiper-slide">
                    <div class="card" onclick="this.classList.toggle('flipped')">
                        <div class="card-inner">
                            <div class="front">
                                <div class="emoji">💙💗</div><h3>${c.q}</h3>
                            </div>
                            <div class="back" style="background: ${gradiente}">
                                <h3>${c.a}</h3>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        new Swiper('.swiper', { effect: 'cards', grabCursor: true });
    </script>
</body>
</html>
